syntax = "proto3";

package wallet;

option go_package = "./pb";

message CreateWalletReq {
}

message CreateWalletResp {
  int64 walletId = 1;
  int64 balance = 2;
}

message GetWalletReq {
  int64 walletId = 1;
}

message GetWalletResp {
  int64 walletId = 1;
  int64 balance = 2;
  reserved 3;
}

message TransferReq {
  int64 fromWalletId = 1;
  int64 toWalletId = 2;
  int64 amount = 3;
  string remark = 4;
}

message TransferResp {
  string transferId = 1;
  int64 fromWalletId = 2;
  int64 toWalletId = 3;
  int64 amount = 4;
  string remark = 5;
  int64 fromWalletBalanceBefore = 6;
  int64 fromWalletBalanceAfter = 7;
  int64 toWalletBalanceBefore = 8;
  int64 toWalletBalanceAfter = 9;
}

service Wallet {
  rpc CreateWallet(CreateWalletReq) returns(CreateWalletResp);
  rpc GetWallet(GetWalletReq) returns(GetWalletResp);
  rpc Transfer(TransferReq) returns(TransferResp);
}
